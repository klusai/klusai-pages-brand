---
layout: default
---
<div class="wrap narrow page-pad">
  <article>
    <p class="eyebrow">{{ page.categories | join: " · " | default: "Update" }}</p>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
    {{ content }}
    <hr>
    <p><a href="{{ '/blog/' | relative_url }}">← All posts</a></p>
  </article>
</div>
